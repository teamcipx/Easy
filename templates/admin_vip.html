{% extends "layout.html" %}
{% block content %}
<div class="space-y-4">
    <h2 class="text-xl font-bold text-[#0A2540]">VIP Requests</h2>
    
    {% for req in requests %}
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <div class="flex justify-between mb-2">
            <span class="font-bold text-sm text-slate-700">{{ req.user_email }}</span>
            <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-xs font-bold">Level {{ req.level_id }}</span>
        </div>
        <p class="text-xs text-slate-500">Method: {{ req.method }} | {{ req.number }}</p>
        <p class="text-xs text-slate-500 font-mono bg-slate-50 p-1 mt-1 rounded inline-block">Trx: {{ req.trx_id }}</p>
        
        <div class="flex gap-2 mt-3">
            <a href="/admin/vip/action/reject/{{ req.id }}" class="flex-1 bg-red-50 text-red-600 py-1.5 rounded text-xs font-bold text-center">Reject</a>
            <a href="/admin/vip/action/approve/{{ req.id }}" class="flex-1 bg-green-600 text-white py-1.5 rounded text-xs font-bold text-center">Approve (Commission Auto)</a>
        </div>
    </div>
    {% else %}
    <p class="text-center text-slate-400 py-10">No pending requests</p>
    {% endfor %}
</div>
{% endblock %}
