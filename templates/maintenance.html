<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>Earn Daily | Under Maintenance</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Hind Siliguri', 'Inter', sans-serif; 
        }
        
        /* Soft Entry Animation */
        .fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Gentle Pulse for the Icon */
        .soft-pulse {
            animation: softPulse 2.5s infinite ease-in-out;
        }
        @keyframes softPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-5 text-slate-800">

    <div class="max-w-md w-full bg-white rounded-[32px] p-8 md:p-10 text-center shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 fade-in-up">
        
        <!-- Brand Logo Area -->
        <div class="mb-10 flex items-center justify-center gap-2">
            <div class="h-8 w-8 bg-blue-600 text-white rounded-lg flex items-center justify-center shadow-md">
                <i class="fa-solid fa-chart-line text-sm"></i>
            </div>
            <span class="text-xl font-black tracking-tight text-slate-900">Earn<span class="text-blue-600">Daily</span></span>
        </div>

        <!-- Illustration / Icon -->
        <div class="w-24 h-24 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 soft-pulse">
            <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>

        <!-- Badge -->
        <div class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4">
            <i class="fa-solid fa-circle-notch fa-spin text-blue-500"></i>
            Updating System
        </div>

        <!-- Headings & Text -->
        <h1 class="text-2xl font-bold text-slate-900 mb-3 tracking-tight">সিস্টেম আপডেট চলছে</h1>
        
        <p class="text-sm text-slate-500 leading-relaxed mb-8 font-medium">
            উন্নত এবং নিরবচ্ছিন্ন সেবা নিশ্চিত করতে আমাদের সার্ভার আপগ্রেডের কাজ চলছে। সাময়িক এই অসুবিধার জন্য আমরা আন্তরিকভাবে দুঃখিত। 
            <br>খুব শীঘ্রই আমরা ফিরে আসছি!
        </p>

        <!-- Divider -->
        <hr class="border-slate-100 mb-6">

        <!-- Admin Login Button -->
        <div>
            <a href="/login" class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-lg transition-colors duration-300">
                <i class="fa-solid fa-lock text-[10px]"></i> Admin Access
            </a>
        </div>

    </div>

</body>
</html>
