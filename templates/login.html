{% extends "layout.html" %}

{% block content %}

<style>
    /* Smooth Slide-up Entry */
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    
    /* Modern Premium Card */
    .premium-auth-card {
        background: #ffffff;
        border: 1px solid #E2E8F0;
        border-radius: 32px;
        box-shadow: 0 10px 40px -10px rgba(37, 99, 235, 0.08);
        position: relative;
        overflow: hidden;
    }

    /* Clean Input Fields */
    .auth-input {
        background: #F8FAFC;
        border: 1.5px solid #E2E8F0;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .auth-input:focus {
        background: #FFFFFF;
        border-color: #2563EB;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        outline: none;
    }
</style>

<div class="flex items-center justify-center min-h-[80vh] py-6 fade-up">
    
    <div class="premium-auth-card w-full max-w-sm p-8 sm:p-10">
        
        <!-- Subtle Top Border Accent -->
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-600 to-sky-400"></div>
        
        <!-- Abstract Background Shape -->
        <div class="absolute -right-10 -top-10 w-32 h-32 bg-blue-50 rounded-full blur-2xl pointer-events-none"></div>

        <!-- 1. Header -->
        <div class="text-center mb-8 relative z-10">
            <div class="h-16 w-16 bg-blue-600 text-white rounded-[20px] flex items-center justify-center text-3xl mx-auto mb-5 shadow-[0_8px_20px_rgba(37,99,235,0.3)] transform -rotate-3">
                <i class="fa-solid fa-right-to-bracket"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 tracking-tight leading-none mb-1">Welcome Back</h2>
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Sign in to continue</p>
        </div>

        <!-- 2. Login Form -->
        <form method="POST" action="/login" class="space-y-5 relative z-10" id="loginForm" onsubmit="showLoading()">
            
            <!-- Email Input -->
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">Email Address</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-regular fa-envelope text-slate-400 group-focus-within:text-blue-600 transition-colors"></i>
                    </div>
                    <input type="email" name="email" required 
                           class="auth-input w-full pl-11 pr-4 py-3.5 rounded-[16px] text-sm font-semibold text-slate-800 placeholder-slate-400" 
                           placeholder="user@gmail.com">
                </div>
            </div>
            
            <!-- Password Input -->
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1.5 ml-1 uppercase tracking-widest">Password</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-400 group-focus-within:text-blue-600 transition-colors"></i>
                    </div>
                    <input type="password" name="password" id="passwordInput" required 
                           class="auth-input w-full pl-11 pr-12 py-3.5 rounded-[16px] text-sm font-bold text-slate-800 tracking-wider placeholder-slate-400" 
                           placeholder="••••••••">
                    
                    <!-- Eye Icon (Toggle) -->
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-slate-400 hover:text-blue-600 transition" onclick="togglePassword()">
                        <i id="eyeIcon" class="fa-regular fa-eye-slash"></i>
                    </div>
                </div>
                
                <!-- Forgot Password Link -->
                <div class="flex justify-between items-center mt-3 px-1">
                    <div class="flex items-center gap-1.5">
                        <input type="checkbox" id="remember" class="accent-blue-600 h-3 w-3 cursor-pointer">
                        <label for="remember" class="text-[10px] font-bold text-slate-500 cursor-pointer select-none">Remember me</label>
                    </div>
                    <a href="https://t.me/payrsrp" target="_blank" class="text-[10px] font-bold text-blue-600 hover:underline transition">Forgot Password?</a>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-[16px] font-black text-sm uppercase tracking-widest shadow-[0_8px_20px_rgba(37,99,235,0.25)] hover:bg-blue-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4">
                <span>Sign In</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        
        <!-- 3. Footer / Register Link -->
        <div class="mt-8 pt-6 border-t border-slate-100 text-center relative z-10">
            <p class="text-xs font-semibold text-slate-500">
                Don't have an account? 
                <a href="/register" class="text-blue-600 font-black hover:underline ml-1">
                    Create Now
                </a>
            </p>
        </div>

    </div>
</div>

<!-- Scripts -->
<script>
    // Password Visibility Toggle
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const icon = document.getElementById('eyeIcon');
        
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye', 'text-blue-600');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye', 'text-blue-600');
            icon.classList.add('fa-eye-slash');
        }
    }

    // Submit Loading State
    function showLoading() {
        const form = document.getElementById('loginForm');
        if(form.checkValidity()) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-lg"></i> <span class="tracking-widest">Authenticating...</span>';
            btn.classList.add('opacity-90', 'cursor-not-allowed');
            return true;
        }
        return false;
    }
</script>

{% endblock %}
