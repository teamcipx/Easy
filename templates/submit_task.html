{% extends "layout.html" %}
{% block content %}

<style>
    .fade-in-up { animation: fadeInUp 0.5s forwards; opacity: 0; transform: translateY(15px); }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Animated Timer Circle */
    .timer-ring {
        position: relative;
        width: 120px; height: 120px;
        border-radius: 50%;
        background: conic-gradient(#2563EB var(--progress, 100%), #E2E8F0 0deg);
        display: flex; align-items: center; justify-content: center;
        transition: background 1s linear;
        box-shadow: 0 10px 30px rgba(37, 99, 235, 0.2);
    }
    .timer-inner {
        width: 100px; height: 100px;
        background: #ffffff;
        border-radius: 50%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
    }
</style>

<div class="max-w-md mx-auto space-y-6 fade-in-up pb-10 px-1 pt-6 text-center">

    <!-- Header Icon -->
    <div class="h-16 w-16 bg-blue-50 text-blue-600 rounded-[20px] flex items-center justify-center text-3xl mx-auto mb-2 border border-blue-100 shadow-sm">
        <i class="fa-solid fa-hourglass-half animate-pulse"></i>
    </div>
    
    <h2 class="text-2xl font-black text-slate-800 tracking-tight">Processing Task...</h2>
    <p class="text-xs text-slate-500 font-medium px-4">
        দয়া করে পেইজটি ক্লোজ করবেন না। আমরা আপনার টাস্কের ডেস্টিনেশন লিংক প্রস্তুত করছি।
    </p>

    <!-- Ad Space (Top) -->
    <div class="bg-white border border-slate-200 rounded-[20px] p-2 flex justify-center overflow-hidden my-6">
        <script>
          atOptions = {
            'key' : '4a72be96f78b75e42afea5ee99005d34',
            'format' : 'iframe',
            'height' : 60,
            'width' : 468,
            'params' : {}
          };
        </script>
        <script src="https://www.highperformanceformat.com/4a72be96f78b75e42afea5ee99005d34/invoke.js"></script>
    </div>

    <!-- The Timer UI -->
    <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-100 flex flex-col items-center">
        
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6">Security Check in Progress</p>

        <div class="timer-ring mb-6" id="timerRing">
            <div class="timer-inner">
                <span id="countdownText" class="text-4xl font-black text-blue-600 font-mono leading-none">{{ timer }}</span>
                <span class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-wider">Secs</span>
            </div>
        </div>

        <p id="instructionText" class="text-xs text-slate-500 font-medium mb-6">
            Please wait <b class="text-slate-800">{{ timer }} seconds</b>.
        </p>

        <!-- Hidden Action Button (Appears when timer ends) -->
        <a href="{{ next_route }}" id="continueBtn" {% if 'http' in next_route %} target="_blank" {% endif %} class="hidden w-full bg-blue-600 text-white py-4 rounded-[16px] font-black text-sm uppercase tracking-widest shadow-[0_8px_20px_rgba(37,99,235,0.25)] hover:bg-blue-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <span>Continue to Task</span>
            <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>

    <!-- Ad Space (Bottom) -->
    <div class="bg-white border border-slate-200 rounded-[20px] p-2 flex justify-center overflow-hidden mt-6">
        <script>
          atOptions = {
            'key' : '4a72be96f78b75e42afea5ee99005d34',
            'format' : 'iframe',
            'height' : 60,
            'width' : 468,
            'params' : {}
          };
        </script>
        <script src="https://www.highperformanceformat.com/4a72be96f78b75e42afea5ee99005d34/invoke.js"></script>
    </div>

</div>

<!-- Timer Logic -->
<script>
    document.addEventListener("DOMContentLoaded", () => {
        let totalTime = parseInt("{{ timer }}");
        let timeLeft = totalTime;
        
        const countdownText = document.getElementById("countdownText");
        const timerRing = document.getElementById("timerRing");
        const instructionText = document.getElementById("instructionText");
        const continueBtn = document.getElementById("continueBtn");

        const interval = setInterval(() => {
            timeLeft--;
            
            // Update Text
            countdownText.innerText = timeLeft;
            
            // Update Circular Progress Bar
            let percentage = (timeLeft / totalTime) * 100;
            timerRing.style.setProperty('--progress', `${percentage}%`);

            if (timeLeft <= 0) {
                clearInterval(interval);
                
                // Show Button and Success State
                timerRing.style.background = "#10B981"; // Emerald Green
                countdownText.innerHTML = '<i class="fa-solid fa-check text-green-500"></i>';
                countdownText.nextElementSibling.style.display = 'none'; // Hide "Secs" text
                
                instructionText.innerHTML = "<span class='text-green-600 font-bold'>Verification Complete! Click below to proceed.</span>";
                continueBtn.classList.remove("hidden");
            }
        }, 1000);
    });
</script>

{% endblock %}
