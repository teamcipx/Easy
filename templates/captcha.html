{% extends "layout.html" %}
{% block content %}
<style>
    .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Ad Container */
    .premium-ad-card {
        background: #ffffff; border: 1px solid #E2E8F0; border-radius: 20px;
        position: relative; padding: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        margin: 16px 0; overflow: hidden;
    }
    .ad-badge { position: absolute; top: 0; right: 0; background: #F1F5F9; color: #94A3B8; font-size: 8px; font-weight: 800; text-transform: uppercase; padding: 4px 8px; border-bottom-left-radius: 12px; z-index: 10; }
    .ad-inner { display: flex; justify-content: center; align-items: center; background: #F8FAFC; border-radius: 12px; overflow: hidden; min-height: 60px; }

    /* Captcha Box Pattern */
    .captcha-box {
        background-color: #f1f5f9;
        background-image: radial-gradient(#cbd5e1 2px, transparent 2px), radial-gradient(#cbd5e1 2px, transparent 2px);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        user-select: none; /* Prevent Copying */
    }
</style>

<div class="max-w-xl mx-auto px-1 pb-8 fade-in-up">

    <!-- AD 1 -->
    <div class="premium-ad-card"><span class="ad-badge">Sponsored</span><div class="ad-inner"><script>atOptions = {'key' : '4a72be96f78b75e42afea5ee99005d34','format' : 'iframe','height' : 60,'width' : 468,'params' : {}};</script><script src="https://www.highperformanceformat.com/4a72be96f78b75e42afea5ee99005d34/invoke.js"></script></div></div>

    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-700 to-blue-600 rounded-[24px] p-6 text-white shadow-lg relative overflow-hidden mb-6">
        <i class="fa-solid fa-keyboard absolute right-4 top-1/2 transform -translate-y-1/2 text-8xl opacity-10"></i>
        <div class="relative z-10 flex items-center justify-between">
            <div>
                <h2 class="text-2xl font-black">Captcha Entry</h2>
                <p class="text-xs text-blue-200 mt-1">ক্যাপচা পূরণ করুন এবং ১ টাকা পান</p>
            </div>
            <div class="bg-white/20 backdrop-blur-sm border border-white/20 px-4 py-2 rounded-xl text-center">
                <p class="text-[9px] font-bold uppercase tracking-widest text-blue-200">Today</p>
                <p class="text-xl font-black font-mono">{{ count }}/10</p>
            </div>
        </div>
    </div>

    <!-- Captcha Form -->
    <form method="POST" class="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100">
        
        <p class="text-center text-xs text-slate-500 font-bold mb-4 uppercase tracking-widest">Type the text below</p>
        
        <!-- The Captcha Display -->
        <div class="captcha-box border-2 border-slate-300 rounded-[16px] py-6 px-4 text-center mb-6 relative overflow-hidden">
            <!-- Strike-through line to make it harder for bots -->
            <div class="absolute top-1/2 left-0 w-full h-0.5 bg-slate-400 transform -rotate-2"></div>
            <h1 class="text-4xl font-black text-slate-800 tracking-[0.3em] font-mono italic mix-blend-multiply">{{ captcha_text }}</h1>
        </div>

        <div class="relative mb-6">
            <input type="text" name="captcha_input" required autocomplete="off" placeholder="Enter Captcha Code" 
                   class="w-full bg-slate-50 border-2 border-slate-200 rounded-[16px] px-4 py-4 text-center text-lg font-bold text-blue-600 uppercase focus:outline-none focus:border-blue-500 transition">
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-[16px] font-black uppercase tracking-widest shadow-lg hover:bg-blue-700 active:scale-95 transition flex items-center justify-center gap-2">
            Submit Code <i class="fa-solid fa-arrow-right"></i>
        </button>
    </form>

    <!-- AD 2 -->
